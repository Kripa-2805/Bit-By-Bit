<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit-By-Bit | Official Tech Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #3b82f6; --bg: #0f172a; --text: #f8fafc; 
            --accent: rgba(59, 130, 246, 0.4); --section-bg: rgba(30, 41, 59, 0.6); 
            --bridge-bg: #1e293b;
        }

        [data-theme='light'] { 
            --bg: #f8fafc; --text: #0f172a; --primary: #2563eb; 
            --accent: rgba(37, 99, 235, 0.25); --section-bg: #e2e8f0; 
            --bridge-bg: #2563eb;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); color: var(--text); 
            transition: background-color 0.6s ease;
            overflow-x: hidden; cursor: none;
        }

        /* TYPING LOADER FIX
        /* TYPING LOADER ANIMATION */
        #loader {
            position: fixed; inset: 0; background: #020617; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .typing-container {
            font-family: 'Courier New', monospace;
            color: #3b82f6;
            font-size: 14px;
            letter-spacing: 2px;
            width: 0;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #3b82f6;
            animation: typing 2.5s steps(30, end) forwards, blink .5s step-end infinite;
        }
        @keyframes typing { from { width: 0 } to { width: 280px } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #3b82f6 } }

        /* HEADING FONT */
        .font-display { font-family: 'Orbitron', sans-serif; }

        /* CURSOR — hidden on touch devices */
        #cursor { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; }
        #cursor-ring { width: 40px; height: 40px; border: 2px solid var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: transform 0.1s; }
        @media (hover: none) and (pointer: coarse) {
            #cursor, #cursor-ring { display: none !important; }
            body { cursor: auto; }
        }

        /* JELLY TOGGLE */
        .theme-toggle-box {
            position: relative;
            overflow: visible;
        }
        .theme-toggle-box::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 14px;
            background: var(--primary);
            opacity: 0;
            transform: scale(0.85);
            transition: opacity 0.3s, transform 0.3s;
            z-index: -1;
        }
        .theme-toggle-box:active {
            animation: jellyPop 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        .theme-toggle-box:hover::before {
            opacity: 0.15;
            transform: scale(1);
        }
        @keyframes jellyPop {
            0%   { transform: scale(1); }
            20%  { transform: scale(0.82, 1.18); }
            40%  { transform: scale(1.14, 0.88); }
            60%  { transform: scale(0.94, 1.07); }
            80%  { transform: scale(1.04, 0.96); }
            100% { transform: scale(1); }
        }

        .content-wrap { padding-top: 100px; }

        /* BACKGROUND CANVAS */
        #bg-canvas {
            position: fixed; inset: 0; z-index: -1;
            width: 100%; height: 100%;
        }

        /* LOGO BARS */
        .bar { transition: height 0.3s ease; transform-origin: bottom; }
        .logo-box:hover .bar-1 { height: 20px; }
        .logo-box:hover .bar-2 { height: 8px; }
        .logo-box:hover .bar-3 { height: 14px; }

        /* THEME TOGGLE DOODLE (MATCHING IMAGE) */
        .theme-toggle-box {
            width: 48px; height: 48px; border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.05);
        }
        [data-theme='light'] .theme-toggle-box { border-color: rgba(0,0,0,0.1); background: #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }


        .nav-link { position: relative; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background: var(--primary); transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }

        .btn-grad { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); color: white; }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.1); }
        [data-theme='light'] .glass { background: rgba(255, 255, 255, 0.85); border-color: rgba(37, 99, 235, 0.1); }

        .reveal { animation: revealUp 0.8s ease forwards; opacity: 0; }
        @keyframes revealUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* BRIGHT SOCIALS */
        .social-card { 
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.15), rgba(30, 64, 175, 0.05));
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .social-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: transparent;
            border: 2px solid transparent;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        .social-card:hover::after {
            border-color: rgba(59, 130, 246, 0.7);
            box-shadow: 0 0 24px rgba(59, 130, 246, 0.35), inset 0 0 24px rgba(59, 130, 246, 0.05);
        }
        .social-card:hover { 
            background: var(--primary); color: white !important; 
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4);
            transform: translateY(-10px);
        }

        @keyframes scanMove {
            from { background-position: 0 0; }
            to   { background-position: 0 100px; }
        }
        @keyframes textPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(59,130,246,0.6)); opacity: 1; }
            50%      { filter: drop-shadow(0 0 40px rgba(59,130,246,1)); opacity: 0.85; }
        }

        /* NAV SCAN LINE */
        nav::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.6;
        }

        /* SECTION HEADING ACCENT */
        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .section-label::before { content: '['; opacity: 0.5; }
        .section-label::after  { content: ']'; opacity: 0.5; }

        /* HERO GLITCH - CONTINUOUS THUNDER */
        .glitch {
            position: relative;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
        }
        .glitch::before {
            color: #60a5fa;
            animation: thunder1 2.4s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
        }
        .glitch::after {
            color: #1d4ed8;
            animation: thunder2 2.4s infinite;
            clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
        }
        @keyframes thunder1 {
            0%              { transform: translate(0);         opacity: 0; }
            5%              { transform: translate(-4px, 2px); opacity: 0.9; }
            6%              { transform: translate(4px, -1px); opacity: 0.9; }
            7%              { transform: translate(-2px, 1px); opacity: 0.8; }
            8%              { transform: translate(0);         opacity: 0; }
            40%             { transform: translate(0);         opacity: 0; }
            40.5%           { transform: translate(-6px, 2px); opacity: 1; }
            41%             { transform: translate(3px, -2px); opacity: 1; }
            41.5%           { transform: translate(-1px, 1px); opacity: 0.7; }
            42%             { transform: translate(0);         opacity: 0; }
            70%             { transform: translate(0);         opacity: 0; }
            70.3%           { transform: translate(5px, -1px); opacity: 0.9; }
            70.6%           { transform: translate(-3px, 2px); opacity: 0.9; }
            70.9%           { transform: translate(0);         opacity: 0; }
            100%            { transform: translate(0);         opacity: 0; }
        }
        @keyframes thunder2 {
            0%              { transform: translate(0);         opacity: 0; }
            5%              { transform: translate(4px, -2px); opacity: 0.9; }
            6%              { transform: translate(-4px, 1px); opacity: 0.9; }
            7%              { transform: translate(2px, -1px); opacity: 0.8; }
            8%              { transform: translate(0);         opacity: 0; }
            40%             { transform: translate(0);         opacity: 0; }
            40.5%           { transform: translate(6px, -2px); opacity: 1; }
            41%             { transform: translate(-3px, 2px); opacity: 1; }
            41.5%           { transform: translate(1px, -1px); opacity: 0.7; }
            42%             { transform: translate(0);         opacity: 0; }
            70%             { transform: translate(0);         opacity: 0; }
            70.3%           { transform: translate(-5px, 1px); opacity: 0.9; }
            70.6%           { transform: translate(3px, -2px); opacity: 0.9; }
            70.9%           { transform: translate(0);         opacity: 0; }
            100%            { transform: translate(0);         opacity: 0; }
        }

        /* CARD CORNER BRACKETS */
        .corner-card {
            position: relative;
        }
        .corner-card::before, .corner-card::after {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            border-color: var(--primary);
            border-style: solid;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .corner-card::before {
            top: 10px; left: 10px;
            border-width: 2px 0 0 2px;
            border-radius: 2px 0 0 0;
        }
        .corner-card::after {
            bottom: 10px; right: 10px;
            border-width: 0 2px 2px 0;
            border-radius: 0 0 2px 0;
        }
        .corner-card:hover::before, .corner-card:hover::after { opacity: 1; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="flex items-end gap-1.5 h-10 mb-6">
            <div class="w-2 bg-blue-500 h-1/2"></div>
            <div class="w-2 bg-blue-600 h-full"></div>
            <div class="w-2 bg-blue-700 h-3/4"></div>
        </div>
        <div class="typing-container">&gt; LOADING BIT-BY-BIT...</div>
    </div>

    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <canvas id="bg-canvas"></canvas>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [theme, setTheme] = useState('dark');
            const [teams, setTeams] = useState({});
            const [activeTeam, setActiveTeam] = useState(null);

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                const cursor = document.getElementById('cursor');
                const ring = document.getElementById('cursor-ring');
                const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
                let onMouseMove;
                if (!isTouchDevice) {
                    onMouseMove = (e) => {
                        cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
                        ring.style.left = (e.clientX - 20) + 'px'; ring.style.top = (e.clientY - 20) + 'px';
                    };
                    window.addEventListener('mousemove', onMouseMove);
                }
                
                // Realistic typing timeout for loader
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 800);
                }, 3000);

                fetch('/api/teams').then(r => r.json()).then(data => {
                    setTeams(data);
                    setActiveTeam(Object.keys(data)[0]);
                });
                return () => { if (onMouseMove) window.removeEventListener('mousemove', onMouseMove); };
            }, [theme]);

            return (
                <div className="relative">
                    <nav className="relative fixed top-0 w-full z-50 px-10 py-6 flex justify-between items-center backdrop-blur-md border-b border-white/5">
                        <div className="flex items-center gap-3 logo-box cursor-pointer group">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <rect className="bar bar-1" x="3" y="13" width="4" height="8" rx="1" fill="#60a5fa" />
                                <rect className="bar bar-2" x="10" y="7" width="4" height="14" rx="1" fill="#3b82f6" />
                                <rect className="bar bar-3" x="17" y="3" width="4" height="18" rx="1" fill="#1e40af" />
                            </svg>
                            <span className="font-display text-lg font-black tracking-tighter">BIT-BY-BIT</span>
                        </div>

                        <div className="hidden md:flex gap-12">
                            {['home', 'leads', 'teams', 'glimpses', 'connect'].map(item => (
                                <a key={item} href={`#${item}`} className="nav-link">{item}</a>
                            ))}
                        </div>

                        <div onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="theme-toggle-box">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                                <circle cx="12" cy="12" r="4" fill={theme === 'dark' ? 'white' : 'black'} />
                                <circle cx="12" cy="4" r="1" fill="currentColor" />
                                <circle cx="12" cy="20" r="1" fill="currentColor" />
                                <circle cx="4" cy="12" r="1" fill="currentColor" />
                                <circle cx="20" cy="12" r="1" fill="currentColor" />
                                <circle cx="6.34" cy="6.34" r="1" fill="currentColor" />
                                <circle cx="17.66" cy="17.66" r="1" fill="currentColor" />
                                <circle cx="6.34" cy="17.66" r="1" fill="currentColor" />
                                <circle cx="17.66" cy="6.34" r="1" fill="currentColor" />
                            </svg>
                        </div>
                    </nav>

                    <div className="content-wrap">
                        <header id="home" className="min-h-[85vh] flex flex-col justify-center items-center px-8 text-center relative reveal">
                            <h1 className="glitch font-display text-5xl md:text-[8rem] font-black tracking-tighter leading-none mb-8 uppercase" data-text="BIT-BY-BIT">BIT-BY-BIT</h1>
                            <p className="text-xl md:text-2xl opacity-60 max-w-3xl mx-auto leading-relaxed mb-12">Building high-performance tech systems from the ground up.</p>
                            <a href="#teams" className="btn-grad px-12 py-4 rounded-full font-bold shadow-2xl shadow-blue-500/20 hover:scale-105 transition uppercase tracking-widest">Explore Systems</a>
                        </header>

                        <section id="leads" className="py-32 px-8 bg-[var(--section-bg)] shadow-inner reveal">
                            <div className="max-w-6xl mx-auto">
                                <p className="section-label text-center w-full justify-center mb-3">Core Team</p>
                                <h2 className="text-4xl font-extrabold text-center mb-20 tracking-tight">The Core Leadership</h2>
                                <div className="grid md:grid-cols-3 gap-12">
                                    {/* PHOTO SWAP: ATHERVA GETS JIYA'S SEED, GIRLS GET ATHERVA'S SEED */}
                                    <LeadCard name="Atherva Sahai" role="President" seed="Jiya" />
                                    <LeadCard name="Chavi Agarwal" role="Vice President" seed="Atherva" />
                                    <LeadCard name="Jiya Arora" role="Gen Secretary" seed="Atherva" />
                                </div>
                            </div>
                        </section>

                        <section id="teams" className="py-32 px-8 reveal">
                            <div className="max-w-6xl mx-auto">
                                <p className="section-label text-center w-full justify-center mb-3">Departments</p>
                                <h2 className="text-4xl font-extrabold text-center mb-16 tracking-tight uppercase">Operational Domains</h2>
                                <div className="flex flex-wrap justify-center gap-3 mb-20">
                                    {Object.keys(teams).map(t => (
                                        <button key={t} onClick={() => setActiveTeam(t)} className={`px-6 py-2 rounded-xl font-bold transition-all border ${activeTeam === t ? 'bg-blue-600 text-white border-blue-600 shadow-lg' : 'glass opacity-60 hover:opacity-100'}`}>
                                            {t}
                                        </button>
                                    ))}
                                </div>
                                {activeTeam && (
                                    <div className="corner-card glass p-12 rounded-[3rem] grid md:grid-cols-2 gap-16 shadow-2xl">
                                        <div className="space-y-8">
                                            <div className="p-8 rounded-3xl bg-blue-600/10 border border-blue-600/20 shadow-sm">
                                                <p className="text-[10px] font-bold uppercase text-blue-500 tracking-widest mb-2">Team Lead</p>
                                                <h4 className="text-4xl font-extrabold leading-tight">{teams[activeTeam].lead}</h4>
                                            </div>
                                            <div className="p-8 rounded-3xl bg-blue-600/10 border border-blue-600/20 shadow-sm">
                                                <p className="text-[10px] font-bold uppercase text-blue-500 tracking-widest mb-2">Co-Lead</p>
                                                <h4 className="text-4xl font-extrabold leading-tight">{teams[activeTeam].co_lead}</h4>
                                            </div>
                                        </div>
                                        <div className="bg-white/5 p-10 rounded-[2.5rem] border border-white/5">
                                            <h5 className="font-bold text-xs opacity-40 uppercase mb-8 tracking-[0.2em]">Core Members</h5>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8">
                                                {teams[activeTeam].core.map(m => (
                                                    <div key={m} className="flex items-center gap-3 font-medium opacity-80 transition hover:opacity-100 hover:text-blue-500 cursor-default">
                                                        <div className="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>{m}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>

                        <section id="glimpses" className="py-32 px-8 max-w-7xl mx-auto reveal">
                            <p className="section-label mb-3">Highlights</p>
                            <h2 className="text-5xl font-black tracking-tight mb-16 uppercase">Success Glimpses.</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[1,2,3,4,5,6].map(i => (
                                    <div key={i} className={`rounded-3xl overflow-hidden shadow-lg group relative ${i === 1 ? 'md:col-span-2' : ''}`}>
                                        <img src={`https://picsum.photos/seed/${i+300}/800/600`} className="w-full h-full object-cover transition duration-700 hover:scale-110" />
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* SCALE YOUR POTENTIAL - CINEMATIC BANNER */}
                        <section className="relative py-36 px-8 overflow-hidden" style={{background:'#020617'}}>
                            {/* animated scan lines */}
                            <div className="absolute inset-0 pointer-events-none" style={{
                                backgroundImage:'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(59,130,246,0.03) 2px, rgba(59,130,246,0.03) 4px)',
                                animation:'scanMove 8s linear infinite'
                            }}></div>

                            {/* glow orb center */}
                            <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[300px] rounded-full pointer-events-none"
                                style={{background:'radial-gradient(ellipse, rgba(59,130,246,0.25) 0%, transparent 70%)', filter:'blur(40px)'}}></div>

                            {/* big faded word behind */}
                            <div className="absolute inset-0 flex items-center justify-center pointer-events-none select-none overflow-hidden">
                                <span className="font-display font-black uppercase text-white leading-none"
                                    style={{fontSize:'22vw', opacity:'0.03', letterSpacing:'-0.05em'}}>SCALE</span>
                            </div>

                            {/* content */}
                            <div className="max-w-5xl mx-auto relative z-10 text-center">
                                {/* top label */}
                                <div className="flex items-center justify-center gap-3 mb-8">
                                    <div className="h-px w-16 bg-blue-500 opacity-60"></div>
                                    <span className="text-blue-400 text-[10px] font-bold uppercase tracking-[0.4em]">Bit-By-Bit</span>
                                    <div className="h-px w-16 bg-blue-500 opacity-60"></div>
                                </div>

                                {/* main heading with highlight */}
                                <h3 className="font-display text-5xl md:text-7xl font-black uppercase text-white leading-none mb-6 tracking-tight">
                                    Scale Your<br/>
                                    <span className="relative inline-block">
                                        <span className="relative z-10" style={{
                                            WebkitTextStroke:'1px rgba(59,130,246,0.8)',
                                            color:'transparent',
                                            filter:'drop-shadow(0 0 20px rgba(59,130,246,0.6))',
                                            animation:'textPulse 3s ease-in-out infinite'
                                        }}>Potential.</span>
                                    </span>
                                </h3>

                                <p className="text-blue-200/50 text-lg font-medium max-w-xl mx-auto mb-14 leading-relaxed">
                                    Where every bit of innovation counts.<br/>Join the movement.
                                </p>

                                {/* CTA */}
                                <a href="#connect" className="inline-flex items-center gap-3 px-10 py-4 rounded-full font-bold uppercase tracking-widest text-sm text-white border border-blue-500/50 hover:border-blue-400 hover:shadow-[0_0_30px_rgba(59,130,246,0.4)] transition-all duration-400"
                                    style={{background:'linear-gradient(135deg,rgba(59,130,246,0.2),rgba(30,64,175,0.1))'}}>
                                    Connect With Us
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                                </a>
                            </div>
                        </section>

                        <footer id="connect" className="py-32 px-10 bg-[var(--bg)] relative overflow-hidden">
                            <canvas id="connect-canvas" className="absolute inset-0 w-full h-full pointer-events-none"></canvas>

                            <div className="max-w-5xl mx-auto relative z-10">
                                {/* heading */}
                                <div className="mb-20 text-center">
                                    <p className="section-label justify-center mb-3">Reach Out</p>
                                    <h2 className="font-display text-4xl md:text-6xl font-black tracking-tight uppercase">Let's Connect</h2>
                                    <p className="mt-4 opacity-40 text-sm tracking-widest uppercase">Find us on the internet</p>
                                </div>

                                {/* cards — horizontal strip */}
                                <div className="flex flex-col md:flex-row gap-5 mb-20">
                                    {/* Instagram */}

    <script>
    // ── MAIN PAGE BACKGROUND ─────────────────────────────────────────
    (function() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, nodes, mouse = { x: -9999, y: -9999 };

        const isDark = () => document.documentElement.getAttribute('data-theme') !== 'light';

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
            buildNodes();
        }

        function buildNodes() {
            const count = Math.floor((W * H) / 14000);
            nodes = Array.from({ length: count }, () => ({
                x: Math.random() * W,
                y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.35,
                vy: (Math.random() - 0.5) * 0.35,
                r: Math.random() * 1.8 + 0.6,
                pulse: Math.random() * Math.PI * 2,
            }));
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function draw() {
            const dark = isDark();
            const bg   = dark ? '#0f172a' : '#f8fafc';
            const dot  = dark ? 'rgba(59,130,246,' : 'rgba(37,99,235,';
            const line = dark ? 'rgba(59,130,246,' : 'rgba(37,99,235,';
            const CONN = 140;
            const MOUSE= 220;

            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];
                n.pulse += 0.018;

                const dx = n.x - mouse.x, dy = n.y - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < MOUSE) {
                    const force = (1 - dist / MOUSE) * 0.055;
                    n.vx += (dx / dist) * force;
                    n.vy += (dy / dist) * force;
                }

                n.vx *= 0.982; n.vy *= 0.982;
                n.x += n.vx;   n.y += n.vy;

                if (n.x < 0) n.x = W; if (n.x > W) n.x = 0;
                if (n.y < 0) n.y = H; if (n.y > H) n.y = 0;

                const glow = 0.5 + 0.5 * Math.sin(n.pulse);
                const alpha = dark ? (0.25 + 0.35 * glow) : (0.2 + 0.25 * glow);
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.r * (1 + 0.3 * glow), 0, Math.PI * 2);
                ctx.fillStyle = dot + alpha + ')';
                ctx.fill();

                for (let j = i + 1; j < nodes.length; j++) {
                    const m = nodes[j];
                    const ex = n.x - m.x, ey = n.y - m.y;
                    const d  = Math.sqrt(ex*ex + ey*ey);
                    if (d < CONN) {
                        const a = dark ? (1 - d / CONN) * 0.18 : (1 - d / CONN) * 0.12;
                        ctx.beginPath();
                        ctx.moveTo(n.x, n.y);
                        ctx.lineTo(m.x, m.y);
                        ctx.strokeStyle = line + a + ')';
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        resize();
        draw();
    })();

    // ── CONNECT SECTION BACKGROUND ───────────────────────────────────

        // wait for React to mount then init
        const initConnect = () => {
            const canvas = document.getElementById('connect-canvas');
            if (!canvas) { setTimeout(initConnect, 300); return; }
            const ctx = canvas.getContext('2d');
            let W, H, nodes;

            const isDark = () => document.documentElement.getAttribute('data-theme') !== 'light';

            function resize() {
                const rect = canvas.parentElement.getBoundingClientRect();
                W = canvas.width  = rect.width;
                H = canvas.height = rect.height;
                buildNodes();
            }

            function buildNodes() {
                const count = Math.floor((W * H) / 12000);
                nodes = Array.from({ length: count }, () => ({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    r: Math.random() * 1.6 + 0.5,
                    pulse: Math.random() * Math.PI * 2,
                }));
            }

            window.addEventListener('resize', resize);

            function draw() {
                const dark = isDark();
                const dot  = dark ? 'rgba(59,130,246,' : 'rgba(37,99,235,';
                const line = dark ? 'rgba(59,130,246,' : 'rgba(37,99,235,';
                const CONN = 130;

                ctx.clearRect(0, 0, W, H);

                for (let i = 0; i < nodes.length; i++) {
                    const n = nodes[i];
                    n.pulse += 0.018;
                    n.vx *= 0.995; n.vy *= 0.995;
                    n.x += n.vx;   n.y += n.vy;
                    if (n.x < 0) n.x = W; if (n.x > W) n.x = 0;
                    if (n.y < 0) n.y = H; if (n.y > H) n.y = 0;

                    const glow  = 0.5 + 0.5 * Math.sin(n.pulse);
                    const alpha = dark ? (0.25 + 0.35 * glow) : (0.2 + 0.25 * glow);
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.r * (1 + 0.3 * glow), 0, Math.PI * 2);
                    ctx.fillStyle = dot + alpha + ')';
                    ctx.fill();

                    for (let j = i + 1; j < nodes.length; j++) {
                        const m = nodes[j];
                        const ex = n.x - m.x, ey = n.y - m.y;
                        const d  = Math.sqrt(ex*ex + ey*ey);
                        if (d < CONN) {
                            const a = dark ? (1 - d / CONN) * 0.18 : (1 - d / CONN) * 0.12;
                            ctx.beginPath();
                            ctx.moveTo(n.x, n.y);
                            ctx.lineTo(m.x, m.y);
                            ctx.strokeStyle = line + a + ')';
                            ctx.lineWidth = 0.7;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }

            resize();
            draw();
        };
        setTimeout(initConnect, 1000);
    </script>
