<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit-By-Bit | Official Tech Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; 
            --accent: rgba(37, 99, 235, 0.25); --section-bg: rgba(226,232,240,0.7); 
            --bridge-bg: #2563eb; --card-bg: rgba(255,255,255,0.9);
            --nav-bg: rgba(248,250,252,0.95); --footer-bg: #1e293b;
        }

        [data-theme='dark'] { 
            --bg: #0a0f1e; --text: #e2e8f0; --primary: #3b82f6; 
            --accent: rgba(59, 130, 246, 0.4); --section-bg: rgba(15,23,42,0.8); 
            --bridge-bg: #1e293b; --card-bg: rgba(15,25,50,0.6);
            --nav-bg: rgba(10,15,30,0.95); --footer-bg: #020617;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); color: var(--text); 
            transition: background-color 0.6s ease;
            overflow-x: hidden; cursor: none;
        }

        /* TOUCH RIPPLE */
        .touch-ripple {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%) scale(0);
            background: radial-gradient(circle, rgba(59,130,246,0.5) 0%, rgba(59,130,246,0.1) 60%, transparent 100%);
            animation: touchRipple 0.7s ease-out forwards;
        }
        @keyframes touchRipple {
            0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(6); opacity: 0; }
        }

        /* TOUCH SPARK PARTICLE */
        .touch-spark {
            position: fixed;
            width: 5px; height: 5px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            background: var(--primary);
            animation: sparkFly 0.6s ease-out forwards;
        }
        @keyframes sparkFly {
            0%   { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* MOBILE TOUCH TRAIL */
        .touch-trail-dot {
            position: fixed;
            width: 8px; height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9990;
            background: var(--primary);
            transform: translate(-50%, -50%);
            animation: trailFade 0.5s ease-out forwards;
        }
        @keyframes trailFade {
            0%   { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
            100% { opacity: 0;   transform: translate(-50%,-50%) scale(0.2); }
        }

        /* TYPING LOADER FIX
        /* TYPING LOADER ANIMATION */
        #loader {
            position: fixed; inset: 0; background: #f8fafc; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .typing-container {
            font-family: 'Courier New', monospace;
            color: #2563eb;
            font-size: 14px;
            letter-spacing: 2px;
            width: 0;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #2563eb;
            animation: typing 2.5s steps(30, end) forwards, blink .5s step-end infinite;
        }
        .loader-sub {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 4px;
            color: #94a3b8;
            margin-top: 10px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInSub 0.6s ease 2s forwards;
        }
        @keyframes fadeInSub { to { opacity: 1; } }
        @keyframes typing { from { width: 0 } to { width: 280px } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #2563eb } }

        /* HEADING FONT */
        .font-display { font-family: 'Orbitron', sans-serif; }

        /* CURSOR — arrow + coordinate tag */
        #cursor, #cursor-ring { display: none !important; }

        #custom-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            top: 0; left: 0;
            will-change: transform;
        }
        #custom-cursor svg {
            display: block;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.18));
        }
        #cursor-tag {
            position: absolute;
            top: 18px;
            left: 14px;
            background: #2563eb;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 3px 8px;
            border-radius: 5px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0.92;
            transition: opacity 0.2s;
        }
        [data-theme='dark'] #cursor-tag {
            background: #3b82f6;
            box-shadow: 0 0 10px rgba(59,130,246,0.4);
        }
        /* on hover over interactive elements — tag shows element type */
        body.cursor-hover #cursor-tag {
            background: #1d4ed8;
        }
        @media (hover: none) and (pointer: coarse) {
            #custom-cursor { display: none !important; }
            body { cursor: auto; }
        }

        /* JELLY TOGGLE */
        .theme-toggle-box {
            position: relative;
            overflow: visible;
        }
        .theme-toggle-box::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 14px;
            background: var(--primary);
            opacity: 0;
            transform: scale(0.85);
            transition: opacity 0.3s, transform 0.3s;
            z-index: -1;
        }
        .theme-toggle-box:active {
            animation: jellyPop 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        .theme-toggle-box:hover::before {
            opacity: 0.15;
            transform: scale(1);
        }
        @keyframes jellyPop {
            0%   { transform: scale(1); }
            20%  { transform: scale(0.82, 1.18); }
            40%  { transform: scale(1.14, 0.88); }
            60%  { transform: scale(0.94, 1.07); }
            80%  { transform: scale(1.04, 0.96); }
            100% { transform: scale(1); }
        }

        .content-wrap { padding-top: 100px; }

        /* MOBILE NAV HAMBURGER */
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; z-index: 100; }
        .hamburger span { display: block; width: 24px; height: 2px; background: currentColor; border-radius: 2px; transition: all 0.3s; }
        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* MOBILE DROPDOWN MENU */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 72px; left: 0; right: 0;
            background: rgba(248,250,252,0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(37,99,235,0.2);
            z-index: 49;
            padding: 20px;
            flex-direction: column;
            gap: 4px;
        }
        [data-theme='dark'] .mobile-menu { background: rgba(10,15,30,0.97); border-bottom-color: rgba(59,130,246,0.2); }
        .mobile-menu.open { display: flex; }
        .mobile-menu a {
            padding: 14px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .mobile-menu a:active {
            background: rgba(59,130,246,0.15);
            border-color: rgba(59,130,246,0.3);
            transform: scale(0.97);
        }

        @media (max-width: 768px) {
            .hamburger { display: flex; }

            /* Nav */
            nav { padding-left: 20px !important; padding-right: 20px !important; padding-top: 16px !important; padding-bottom: 16px !important; }

            /* Hero — reduce height so title isn't pushed far down */
            header#home { 
                padding-left: 20px !important; padding-right: 20px !important; 
                min-height: unset !important;
                height: auto !important;
                padding-top: 60px !important;
                padding-bottom: 60px !important;
                justify-content: flex-start !important;
            }
            .glitch { font-size: clamp(3rem, 18vw, 5rem) !important; }
            header#home p { font-size: 1rem !important; }
            header#home a { padding: 14px 28px !important; font-size: 12px !important; }

            /* Sections */
            section#leads, section#teams, section#glimpses { 
                padding-top: 60px !important; padding-bottom: 60px !important;
                padding-left: 16px !important; padding-right: 16px !important;
            }

            /* Leads grid */
            section#leads .grid { grid-template-columns: 1fr !important; gap: 24px !important; }
            section#leads h2 { font-size: 1.8rem !important; margin-bottom: 32px !important; }

            /* LeadCard mobile */
            .corner-card.glass.p-10 { padding: 28px 20px !important; border-radius: 2rem !important; }
            .corner-card .w-44 { width: 100px !important; height: 100px !important; margin-bottom: 20px !important; }
            .corner-card h3 { font-size: 1.5rem !important; }
            .corner-card .-top-4.-right-12 { display: none !important; }

            /* Teams section */
            section#teams h2 { font-size: 1.8rem !important; }
            section#teams .corner-card { padding: 20px 16px !important; border-radius: 1.5rem !important; }
            section#teams .corner-card .grid { grid-template-columns: 1fr !important; gap: 16px !important; }
            section#teams h4 { font-size: 1.6rem !important; }
            section#teams .p-8 { padding: 20px !important; }
            section#teams .p-10 { padding: 20px !important; }
            section#teams .flex-wrap.gap-3 { gap: 8px !important; margin-bottom: 32px !important; }
            section#teams button { padding: 10px 14px !important; font-size: 11px !important; border-radius: 10px !important; }

            /* Glimpses */
            section#glimpses { padding-left: 16px !important; padding-right: 16px !important; }
            section#glimpses h2 { font-size: 2rem !important; }
            section#glimpses .grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
            section#glimpses .md\:col-span-2 { grid-column: span 2 !important; }

            /* Scale potential banner */
            .font-display.text-5xl.md\:text-7xl { font-size: 2.5rem !important; }
            section .py-36 { padding-top: 64px !important; padding-bottom: 64px !important; }

            /* Connect / Footer */
            footer.site-footer { padding: 60px 16px !important; }
            footer.site-footer .grid { grid-template-columns: 1fr !important; gap: 32px !important; }

            /* Events + Reviews */
            section#events .grid { grid-template-columns: 1fr !important; }
            section#reviews .grid { grid-template-columns: 1fr !important; }
        }

        /* Touch-tap active bounce for cards & buttons */
        @media (hover: none) and (pointer: coarse) {
            body { cursor: auto; }
            .social-card:active, footer a.group:active {
                transform: scale(0.96) translateY(2px) !important;
                transition: transform 0.1s ease !important;
            }
            section#teams button:active {
                transform: scale(0.93) !important;
            }
            header#home a:active, .btn-grad:active {
                transform: scale(0.95) !important;
            }
            /* Touch tilt effect for lead cards */
            .corner-card.glass:active {
                transform: scale(0.97) !important;
                transition: transform 0.15s ease !important;
            }
        }

        /* BACKGROUND CANVAS */
        #bg-canvas {
            position: fixed; inset: 0; z-index: -1;
            width: 100%; height: 100%;
        }

        /* LOGO BARS */
        .bar { transition: height 0.3s ease; transform-origin: bottom; }
        .logo-box:hover .bar-1 { height: 20px; }
        .logo-box:hover .bar-2 { height: 8px; }
        .logo-box:hover .bar-3 { height: 14px; }

        /* THEME TOGGLE DOODLE (MATCHING IMAGE) */
        .theme-toggle-box {
            width: 48px; height: 48px; border-radius: 12px;
            border: 1.5px solid rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        [data-theme='dark'] .theme-toggle-box { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); box-shadow: none; }


        .nav-link { position: relative; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em; }
        .nav-link::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background: var(--primary); transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }

        .btn-grad { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); color: white; }

        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(14px); border: 1px solid rgba(37,99,235,0.12); }
        [data-theme='dark'] .glass { background: rgba(15,25,50,0.55); border-color: rgba(59,130,246,0.15); }

        .reveal { animation: revealUp 0.8s ease forwards; opacity: 0; }
        @keyframes revealUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* BRIGHT SOCIALS */
        .social-card { 
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.15), rgba(30, 64, 175, 0.05));
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .social-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: transparent;
            border: 2px solid transparent;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        .social-card:hover::after {
            border-color: rgba(59, 130, 246, 0.7);
            box-shadow: 0 0 24px rgba(59, 130, 246, 0.35), inset 0 0 24px rgba(59, 130, 246, 0.05);
        }
        .social-card:hover { 
            background: var(--primary); color: white !important; 
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4);
            transform: translateY(-10px);
        }

        @keyframes scanMove {
            from { background-position: 0 0; }
            to   { background-position: 0 100px; }
        }
        @keyframes textPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(59,130,246,0.6)); opacity: 1; }
            50%      { filter: drop-shadow(0 0 40px rgba(59,130,246,1)); opacity: 0.85; }
        }

        /* NAV SCAN LINE */
        nav::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.6;
        }

        /* SECTION HEADING ACCENT */
        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .section-label::before { content: '['; opacity: 0.5; }
        .section-label::after  { content: ']'; opacity: 0.5; }

        /* HERO GLITCH - CONTINUOUS THUNDER */
        .glitch {
            position: relative;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
        }
        .glitch::before {
            color: #60a5fa;
            animation: thunder1 2.4s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
        }
        .glitch::after {
            color: #1d4ed8;
            animation: thunder2 2.4s infinite;
            clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
        }
        @keyframes thunder1 {
            0%              { transform: translate(0);         opacity: 0; }
            5%              { transform: translate(-4px, 2px); opacity: 0.9; }
            6%              { transform: translate(4px, -1px); opacity: 0.9; }
            7%              { transform: translate(-2px, 1px); opacity: 0.8; }
            8%              { transform: translate(0);         opacity: 0; }
            40%             { transform: translate(0);         opacity: 0; }
            40.5%           { transform: translate(-6px, 2px); opacity: 1; }
            41%             { transform: translate(3px, -2px); opacity: 1; }
            41.5%           { transform: translate(-1px, 1px); opacity: 0.7; }
            42%             { transform: translate(0);         opacity: 0; }
            70%             { transform: translate(0);         opacity: 0; }
            70.3%           { transform: translate(5px, -1px); opacity: 0.9; }
            70.6%           { transform: translate(-3px, 2px); opacity: 0.9; }
            70.9%           { transform: translate(0);         opacity: 0; }
            100%            { transform: translate(0);         opacity: 0; }
        }
        @keyframes thunder2 {
            0%              { transform: translate(0);         opacity: 0; }
            5%              { transform: translate(4px, -2px); opacity: 0.9; }
            6%              { transform: translate(-4px, 1px); opacity: 0.9; }
            7%              { transform: translate(2px, -1px); opacity: 0.8; }
            8%              { transform: translate(0);         opacity: 0; }
            40%             { transform: translate(0);         opacity: 0; }
            40.5%           { transform: translate(6px, -2px); opacity: 1; }
            41%             { transform: translate(-3px, 2px); opacity: 1; }
            41.5%           { transform: translate(1px, -1px); opacity: 0.7; }
            42%             { transform: translate(0);         opacity: 0; }
            70%             { transform: translate(0);         opacity: 0; }
            70.3%           { transform: translate(-5px, 1px); opacity: 0.9; }
            70.6%           { transform: translate(3px, -2px); opacity: 0.9; }
            70.9%           { transform: translate(0);         opacity: 0; }
            100%            { transform: translate(0);         opacity: 0; }
        }

        /* EVENT CARDS */
        .event-card {
            background: var(--card-bg);
            border: 1px solid rgba(37,99,235,0.15);
            border-radius: 2rem;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
        }
        [data-theme='dark'] .event-card { border-color: rgba(59,130,246,0.2); }
        .event-card:hover { transform: translateY(-8px); box-shadow: 0 30px 60px rgba(37,99,235,0.2); border-color: var(--primary); }

        /* REVIEW CARDS */
        .review-card {
            background: var(--card-bg);
            border: 1px solid rgba(37,99,235,0.12);
            border-radius: 1.5rem;
            transition: all 0.4s ease;
        }
        [data-theme='dark'] .review-card { border-color: rgba(59,130,246,0.18); }
        .review-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(37,99,235,0.15); }

        /* FORM STYLES */
        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--card-bg);
            border: 1.5px solid rgba(37,99,235,0.2);
            border-radius: 14px;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            outline: none;
        }
        [data-theme='dark'] .form-input { border-color: rgba(59,130,246,0.25); }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
        .form-input::placeholder { opacity: 0.45; }

        /* STATS COUNTER */
        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(2.5rem, 6vw, 4rem);
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* PROPER FOOTER */
        .site-footer {
            background: var(--footer-bg);
            color: #94a3b8;
        }
        [data-theme='dark'] .site-footer { background: #020617; }

        /* NAV BG */
        nav { background: var(--nav-bg) !important; }

        /* Light mode section bg overrides */
        .section-alt { background: var(--section-bg); }

        /* Scroll reveal */
        .scroll-reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
        .scroll-reveal.visible { opacity: 1; transform: translateY(0); }
    
        .corner-card {
            position: relative;
        }
        /* ── MARQUEE ── */
        .marquee-wrap { overflow: hidden; border-top: 1px solid rgba(37,99,235,0.12); border-bottom: 1px solid rgba(37,99,235,0.12); background: rgba(37,99,235,0.04); }
        [data-theme='dark'] .marquee-wrap { background: rgba(59,130,246,0.06); }
        .marquee-track { display: flex; width: max-content; animation: marqueeScroll 32s linear infinite; }
        .marquee-track:hover { animation-play-state: paused; }
        .marquee-item { padding: 14px 40px; font-size: 11px; font-weight: 800; letter-spacing: 0.22em; text-transform: uppercase; white-space: nowrap; opacity: 0.5; display: flex; align-items: center; gap: 14px; }
        .marquee-item .mdot { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
        .marquee-item.hi { color: var(--primary); opacity: 1; }
        @keyframes marqueeScroll { from { transform:translateX(0) } to { transform:translateX(-50%) } }

        /* ── STICKY FLOAT CTA ── */
        #float-cta {
            position: fixed; bottom: 28px; right: 28px; z-index: 500;
            background: #2563eb; color: white;
            font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
            padding: 14px 22px; border-radius: 100px;
            box-shadow: 0 8px 30px rgba(37,99,235,0.45);
            cursor: pointer; border: none;
            display: flex; align-items: center; gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.4s;
            opacity: 0; pointer-events: none;
        }
        #float-cta.visible { opacity: 1; pointer-events: all; }
        #float-cta:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 16px 40px rgba(37,99,235,0.55); }
        .pulse-ring {
            position: absolute; inset: -4px; border-radius: 100px;
            border: 2px solid rgba(37,99,235,0.5);
            animation: pulseCTA 2s ease-out infinite; pointer-events: none;
        }
        @keyframes pulseCTA { 0% { transform:scale(1); opacity:0.7 } 100% { transform:scale(1.2); opacity:0 } }

        /* ── HERO BADGE ── */
        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 18px; border-radius: 100px;
            background: rgba(37,99,235,0.08); border: 1px solid rgba(37,99,235,0.2);

    <script>
    // ── MAIN PAGE BACKGROUND ─────────────────────────────────────────
    (function() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, nodes, mouse = { x: -9999, y: -9999 };
        window._bgMouse = mouse;

        const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
            buildNodes();
        }

        function buildNodes() {
            const count = Math.floor((W * H) / 14000);
            nodes = Array.from({ length: count }, () => ({
                x: Math.random() * W,
                y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.35,
                vy: (Math.random() - 0.5) * 0.35,
                r: Math.random() * 1.8 + 0.6,
                pulse: Math.random() * Math.PI * 2,
            }));
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function draw() {
            const dark = isDark();
            const bg   = dark ? '#0f172a' : '#f8fafc';
            const dot  = dark ? 'rgba(59,130,246,' : 'rgba(37,99,235,';
            const line = dark ? 'rgba(59,130,246,' : 'rgba(37,99,235,';
            const CONN = 140;
            const MOUSE= 220;

            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];
                n.pulse += 0.018;

                const dx = n.x - mouse.x, dy = n.y - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < MOUSE) {
                    const force = (1 - dist / MOUSE) * 0.055;
                    n.vx += (dx / dist) * force;
                    n.vy += (dy / dist) * force;
                }

                n.vx *= 0.982; n.vy *= 0.982;
                n.x += n.vx;   n.y += n.vy;

                if (n.x < 0) n.x = W; if (n.x > W) n.x = 0;
                if (n.y < 0) n.y = H; if (n.y > H) n.y = 0;

                const glow = 0.5 + 0.5 * Math.sin(n.pulse);
                const alpha = dark ? (0.25 + 0.35 * glow) : (0.2 + 0.25 * glow);
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.r * (1 + 0.3 * glow), 0, Math.PI * 2);
                ctx.fillStyle = dot + alpha + ')';
                ctx.fill();

                for (let j = i + 1; j < nodes.length; j++) {
                    const m = nodes[j];
                    const ex = n.x - m.x, ey = n.y - m.y;
                    const d  = Math.sqrt(ex*ex + ey*ey);
                    if (d < CONN) {
                        const a = dark ? (1 - d / CONN) * 0.18 : (1 - d / CONN) * 0.12;
                        ctx.beginPath();
                        ctx.moveTo(n.x, n.y);
                        ctx.lineTo(m.x, m.y);
                        ctx.strokeStyle = line + a + ')';
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        resize();
        draw();
    })();

    // ── CONNECT SECTION BACKGROUND ───────────────────────────────────

        // wait for React to mount then init

                W = canvas.width  = rect.width;
                H = canvas.height = rect.height;
                buildNodes();
            }

                const count = Math.floor((W * H) / 12000);
                nodes = Array.from({ length: count }, () => ({
                    x: Math.random() * W,

                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,

            function draw() {
                const dark = isDark();
                const dot  = dark ? 'rgba(59,130,246,' : 'rgba(37,99,235,';
                const line = dark ? 'rgba(59,130,246,' : 'rgba(37,99,235,';
                const CONN = 130;

                ctx.clearRect(0, 0, W, H);

                for (let i = 0; i < nodes.length; i++) {
                    const n = nodes[i];
                    n.pulse += 0.018;
                    n.vx *= 0.995; n.vy *= 0.995;
                    n.x += n.vx;   n.y += n.vy;
                    if (n.x < 0) n.x = W; if (n.x > W) n.x = 0;
                    if (n.y < 0) n.y = H; if (n.y > H) n.y = 0;

                    const glow  = 0.5 + 0.5 * Math.sin(n.pulse);
                    const alpha = dark ? (0.25 + 0.35 * glow) : (0.2 + 0.25 * glow);
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.r * (1 + 0.3 * glow), 0, Math.PI * 2);
                    ctx.fillStyle = dot + alpha + ')';
                    ctx.fill();

                    for (let j = i + 1; j < nodes.length; j++) {
                        const m = nodes[j];
                        const ex = n.x - m.x, ey = n.y - m.y;
                        const d  = Math.sqrt(ex*ex + ey*ey);
                        if (d < CONN) {
                            const a = dark ? (1 - d / CONN) * 0.18 : (1 - d / CONN) * 0.12;
                            ctx.beginPath();
                            ctx.moveTo(n.x, n.y);
                            ctx.lineTo(m.x, m.y);
                            ctx.strokeStyle = line + a + ')';
                            ctx.lineWidth = 0.7;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(draw);
            }

            resize();
            draw();
        };
        setTimeout(initConnect, 1000);
    </script>
    <script>
    // ── SCROLL REVEAL OBSERVER ─────────────────────────────────────
    (function() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.12 });

        const init = () => {
            document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
        };
        setTimeout(init, 800);
        window.addEventListener('load', init);
    })();

    // ── ANIMATED STAT COUNTERS ────────────────────────────────────
    (function() {
        const parseNum = str => parseFloat(str.replace(/[^0-9.]/g, ''));
        const getSuffix = str => str.replace(/[\d.]/g, '');

        const animateCounter = (el) => {
            const original = el.textContent.trim();
            const target = parseNum(original);
            const suf = getSuffix(original);
            if (!target) return;
            const dur = 1800;
            const start = performance.now();
            const tick = (now) => {
                const t = Math.min((now - start) / dur, 1);
                const ease = 1 - Math.pow(1 - t, 3);
                el.textContent = Math.round(ease * target) + suf;
                if (t < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
        };

        const cObs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.querySelectorAll('.stat-number').forEach(animateCounter);
                    cObs.unobserve(entry.target);
                }
            });
        }, { threshold: 0.5 });

        setTimeout(() => {
            document.querySelectorAll('.stat-number').forEach(el => {
                const parent = el.closest('.section-alt') || el.parentElement;
                if (parent) cObs.observe(parent);
            });
        }, 900);
    })();

    // ── STICKY FLOAT CTA ─────────────────────────────────────────
    (function() {
        const btn = document.getElementById('float-cta');
        if (!btn) return;
        window.addEventListener('scroll', () => {
            btn.classList.toggle('visible', window.scrollY > 500);
        }, { passive: true });
    })();

    
    (function() {
        const isTouchDevice = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
        if (!isTouchDevice) return;

        // Touch ripple + sparks on tap
        function spawnRipple(x, y) {
            const el = document.createElement('div');
            el.className = 'touch-ripple';
            el.style.cssText = `left:${x}px;top:${y}px;width:60px;height:60px;`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        function spawnSparks(x, y) {
            const count = 7;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'touch-spark';
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
                const dist  = 30 + Math.random() * 40;
                const dx    = Math.cos(angle) * dist;
                const dy    = Math.sin(angle) * dist;
                el.style.cssText = `left:${x}px;top:${y}px;--dx:${dx}px;--dy:${dy}px;`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 600);
            }
        }

        // Trail dots while dragging
        let lastTrail = 0;
        function spawnTrail(x, y) {
            const now = Date.now();
            if (now - lastTrail < 40) return;
            lastTrail = now;
            const el = document.createElement('div');
            el.className = 'touch-trail-dot';
            el.style.cssText = `left:${x}px;top:${y}px;`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 500);
        }

        document.addEventListener('touchstart', e => {
            const t = e.touches[0];
            spawnRipple(t.clientX, t.clientY);
            spawnSparks(t.clientX, t.clientY);
        }, { passive: true });

        document.addEventListener('touchmove', e => {
            const t = e.touches[0];
            spawnTrail(t.clientX, t.clientY);
            // Also feed touch position to the canvas particle system
            if (window._bgMouse) {
                window._bgMouse.x = t.clientX;
                window._bgMouse.y = t.clientY;
            }
        }, { passive: true });

        document.addEventListener('touchend', () => {
            if (window._bgMouse) {
                window._bgMouse.x = -9999;
                window._bgMouse.y = -9999;
            }
        }, { passive: true });
    })();
    </script>
</body>
